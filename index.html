<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaputter Taschenrechner</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #2c3e50, #1a1a2e);
    }

    .rechner {
        background: #3a3a3a;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 
                    inset 0 2px 3px rgba(255,255,255,0.1);
        width: 320px;
    }

    .display {
        background: #c8d6c8;
        color: #1a1a1a;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: right;
        font-family: 'Courier New', monospace;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        min-height: 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .verlauf {
        font-size: 14px;
        opacity: 0.6;
        min-height: 20px;
        overflow: hidden;
        word-wrap: break-word;
    }

    .eingabe {
        font-size: 26px;
        font-weight: bold;
        overflow: hidden;
        word-wrap: break-word;
    }

    .tasten {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
    }

    button {
        border: none;
        border-radius: 12px;
        font-size: 20px;
        padding: 18px;
        cursor: pointer;
        background: #4a4a4a;
        color: #fff;
        box-shadow: 0 4px 0 #2a2a2a, 0 5px 10px rgba(0,0,0,0.3);
        transition: all 0.1s;
        user-select: none;
    }

    button:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #2a2a2a;
    }

    .operator {
        background: #ff9500;
        box-shadow: 0 4px 0 #cc7700, 0 5px 10px rgba(0,0,0,0.3);
    }

    .operator:active {
        box-shadow: 0 0 0 #cc7700;
    }

    .funktion {
        background: #a5a5a5;
        color: #000;
        box-shadow: 0 4px 0 #858585, 0 5px 10px rgba(0,0,0,0.3);
    }

    .funktion:active {
        box-shadow: 0 0 0 #858585;
    }

    .ist-gleich {
        grid-column: span 2;
    }
</style>
</head>
<body>
    <div class="rechner">
        <div class="display">
            <div class="verlauf" id="verlauf"></div>
            <div class="eingabe" id="eingabe">0</div>
        </div>
        <div class="tasten">
            <button class="funktion" onclick="clearAll()">C</button>
            <button class="funktion" onclick="clearEntry()">CE</button>
            <button class="funktion" onclick="prozent()">%</button>
            <button class="operator" onclick="eingabeOperator('/')">/</button>

            <button onclick="eingabeZahl('7')">7</button>
            <button onclick="eingabeZahl('8')">8</button>
            <button onclick="eingabeZahl('9')">9</button>
            <button class="operator" onclick="eingabeOperator('*')">*</button>

            <button onclick="eingabeZahl('4')">4</button>
            <button onclick="eingabeZahl('5')">5</button>
            <button onclick="eingabeZahl('6')">6</button>
            <button class="operator" onclick="eingabeOperator('-')">-</button>

            <button onclick="eingabeZahl('1')">1</button>
            <button onclick="eingabeZahl('2')">2</button>
            <button onclick="eingabeZahl('3')">3</button>
            <button class="operator" onclick="eingabeOperator('+')">+</button>

            <button onclick="vorzeichen()">+/-</button>
            <button onclick="eingabeZahl('0')">0</button>
            <button onclick="eingabeZahl('.')">.</button>
            <button class="operator ist-gleich" onclick="berechnen()">=</button>
        </div>
    </div>

<script>
    let aktuelleEingabe = '0';
    let verlauf = '';
    let istKaputt = true; // Startet kaputt
    const geheimCode = '41013';

    const eingabeEl = document.getElementById('eingabe');
    const verlaufEl = document.getElementById('verlauf');

    function updateDisplay() {
        eingabeEl.textContent = aktuelleEingabe;
        verlaufEl.textContent = verlauf;
    }

    function eingabeZahl(zahl) {
        // Reset wenn Meldung angezeigt wird
        if (aktuelleEingabe === '0' || 
            aktuelleEingabe === 'lass mich in Ruhe ich bin kaputt' || 
            aktuelleEingabe === 'System repariert' || 
            aktuelleEingabe === 'Fehler') {
            aktuelleEingabe = zahl;
        } else {
            aktuelleEingabe += zahl;
        }
        updateDisplay();
    }

    function eingabeOperator(op) {
        if (/[+\-*/]$/.test(aktuelleEingabe)) {
            aktuelleEingabe = aktuelleEingabe.slice(0, -1) + op;
        } else {
            aktuelleEingabe += op;
        }
        updateDisplay();
    }

    function berechnen() {
        // Geheimcode-Check: 41013 + = repariert den Rechner
        if (aktuelleEingabe === geheimCode && istKaputt) {
            aktuelleEingabe = 'System repariert';
            verlauf = '';
            updateDisplay();
            istKaputt = false;
            
            setTimeout(() => {
                aktuelleEingabe = '0';
                updateDisplay();
            }, 2000);
            return;
        }

        // Normale Berechnung
        verlauf = aktuelleEingabe + ' =';
        
        if (istKaputt) {
            // Kaputt: Immer Troll-Nachricht
            aktuelleEingabe = 'lass mich in Ruhe ich bin kaputt';
        } else {
            // Repariert: Richtig rechnen
            try {
                let ergebnis = Function('"use strict"; return (' + aktuelleEingabe + ')')();
                if (!isFinite(ergebnis)) {
                    aktuelleEingabe = 'Fehler';
                } else {
                    aktuelleEingabe = parseFloat(ergebnis.toFixed(10)).toString();
                }
            } catch (e) {
                aktuelleEingabe = 'Fehler';
            }
        }
        updateDisplay();
    }

    function clearAll() {
        aktuelleEingabe = '0';
        verlauf = '';
        updateDisplay();
    }

    function clearEntry() {
        aktuelleEingabe = '0';
        updateDisplay();
    }

    function prozent() {
        try {
            aktuelleEingabe = (parseFloat(aktuelleEingabe) / 100).toString();
        } catch {
            aktuelleEingabe = '0';
        }
        updateDisplay();
    }

    function vorzeichen() {
        if (!isNaN(aktuelleEingabe) && aktuelleEingabe !== '0') {
            aktuelleEingabe = (parseFloat(aktuelleEingabe) * -1).toString();
            updateDisplay();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') eingabeZahl(e.key);
        if (e.key === '.') eingabeZahl('.');
        if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') eingabeOperator(e.key);
        if (e.key === 'Enter' || e.key === '=') berechnen();
        if (e.key === 'Escape') clearAll();
        if (e.key === 'Backspace') clearEntry();
    });

    updateDisplay();
</script>
</body>
</html>
